<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgoraMT — Gerador de Posts</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#D91B1B;--red-dark:#A01010;--black:#111;--white:#fff}
body{font-family:'Barlow',sans-serif;background:#0e0e0e;color:#e0e0e0;min-height:100vh}
header{background:#111;border-bottom:3px solid var(--red);padding:16px 32px;display:flex;align-items:center;gap:14px}
.logo-h{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;color:#fff}
.logo-h span{color:var(--red)}
.logo-ic{width:34px;height:34px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;font-family:'Barlow Condensed',sans-serif}
.sub-h{margin-left:auto;font-size:11px;color:#555;letter-spacing:1px;text-transform:uppercase}
.main{display:grid;grid-template-columns:320px 1fr;min-height:calc(100vh - 65px)}
.sidebar{background:#161616;border-right:1px solid #252525;padding:24px 20px;display:flex;flex-direction:column;gap:20px;overflow-y:auto}
.sidebar h2{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#555}
.fg{display:flex;flex-direction:column;gap:7px}
.fg label{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:1px}
input[type=text],textarea{background:#1e1e1e;border:1px solid #2e2e2e;border-radius:5px;color:#e0e0e0;font-family:'Barlow',sans-serif;font-size:14px;padding:9px 12px;outline:none;transition:border-color .2s;width:100%}
input[type=text]:focus,textarea:focus{border-color:var(--red)}
textarea{resize:vertical;min-height:110px;line-height:1.5}
.upload-zone{border:2px dashed #2e2e2e;border-radius:7px;padding:28px 12px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.upload-zone:hover{border-color:var(--red);background:rgba(217,27,27,.05)}
.upload-zone.has-img{border-style:solid;border-color:#444}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.up-icon{font-size:28px;margin-bottom:6px}
.up-txt{font-size:12px;color:#555}
.up-sub{font-size:10px;color:#3a3a3a;margin-top:3px}
.up-prev{width:100%;height:110px;object-fit:cover;border-radius:4px;display:none}
.upload-zone.has-img .up-prev{display:block}
.upload-zone.has-img .up-icon,.upload-zone.has-img .up-txt,.upload-zone.has-img .up-sub{display:none}
.btn-gen{background:var(--red);color:#fff;border:none;border-radius:7px;padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;width:100%}
.btn-gen:hover{background:var(--red-dark)}
.btn-gen:active{transform:scale(.98)}
.divider{height:1px;background:#202020}
.output{padding:28px;overflow-y:auto}
.out-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:22px}
.layouts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:36px}
.layout-card{display:flex;flex-direction:column;gap:12px}
.layout-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#444;display:flex;align-items:center;gap:8px}
.lnum{background:var(--red);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.canvas-wrap{position:relative;display:inline-block;border-radius:3px;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.6)}
.canvas-wrap canvas{display:block;width:405px;height:720px}
.btn-dl{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:5px;color:#888;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:9px 18px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-dl:hover{border-color:var(--red);color:var(--red);background:rgba(217,27,27,.05)}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:380px;color:#2a2a2a;text-align:center;gap:14px}
.placeholder p{font-size:13px;color:#383838}
</style>
</head>
<body>
<header>
  <div class="logo-ic">@</div>
  <div class="logo-h"><span>AGORA</span>MT</div>
  <div class="sub-h">Gerador de Posts</div>
</header>
<div class="main">
  <aside class="sidebar">
    <div><h2>Dados da Notícia</h2></div>
    <div class="fg">
      <label>Título da Notícia</label>
      <input type="text" id="titulo" placeholder="Ex: Governo anuncia novo projeto..." maxlength="80"/>
    </div>
    <div class="fg">
      <label>Texto da Notícia</label>
      <textarea id="noticia" placeholder="Texto do corpo da notícia..." maxlength="220"></textarea>
    </div>
    <div class="divider"></div>
    <div class="fg">
      <label>Imagem</label>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*"/>
        <div class="up-icon">🖼️</div>
        <div class="up-txt">Clique ou arraste a imagem</div>
        <div class="up-sub">JPG · PNG · WEBP</div>
        <img class="up-prev" id="preview" src="" alt=""/>
      </div>
    </div>
    <button class="btn-gen" onclick="generateAll()">▶ Gerar os 3 Layouts</button>
  </aside>
  <main class="output">
    <div class="out-title">Layouts prontos para postagem</div>
    <div id="placeholder" class="placeholder">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none"><rect x="6" y="6" width="44" height="44" rx="4" stroke="#2a2a2a" stroke-width="2"/><rect x="14" y="22" width="28" height="3" rx="1.5" fill="#2a2a2a"/><rect x="14" y="29" width="20" height="2.5" rx="1.25" fill="#252525"/><rect x="14" y="35" width="24" height="2.5" rx="1.25" fill="#252525"/><rect x="14" y="12" width="12" height="6" rx="1" fill="#8b0000" opacity="0.5"/></svg>
      <p>Preencha os campos e clique em<br><strong style="color:#555">▶ Gerar os 3 Layouts</strong></p>
    </div>
    <div class="layouts-grid" id="layoutsGrid" style="display:none"></div>
  </main>
</div>

// ─── Image upload ───────────────────────────────
let userImg = null;
const uploadZone = document.getElementById('uploadZone');
const fileInput  = document.getElementById('fileInput');
const preview    = document.getElementById('preview');

fileInput.addEventListener('change', e => loadImg(e.target.files[0]));
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.style.borderColor='#D91B1B'; });
uploadZone.addEventListener('dragleave', () => { uploadZone.style.borderColor=''; });
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.style.borderColor=''; if(e.dataTransfer.files[0]) loadImg(e.dataTransfer.files[0]); });

function loadImg(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { userImg = img; preview.src = ev.target.result; uploadZone.classList.add('has-img'); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ─── Helpers ────────────────────────────────────
function loadB64Img(b64) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => res(img);
    img.src = b64;
  });
}

function wrapText(ctx, text, x, y, maxW, lh) {
  const words = text.split(' ');
  let line = '', lines = [];
  for (const w of words) {
    const test = line + w + ' ';
    if (ctx.measureText(test).width > maxW && line) { lines.push(line.trim()); line = w + ' '; }
    else line = test;
  }
  if (line.trim()) lines.push(line.trim());
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lh));
  return lines.length;
}

function drawUserImg(ctx, img, x, y, w, h) {
  if (!img) {
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.font = '48px serif';
    ctx.textAlign = 'center';
    ctx.fillText('🖼', x + w/2, y + h/2 + 16);
    ctx.textAlign = 'left';
    return;
  }
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();
  const scale = Math.max(w / img.width, h / img.height);
  const sw = img.width * scale, sh = img.height * scale;
  ctx.drawImage(img, x + (w - sw)/2, y + (h - sh)/2, sw, sh);
  ctx.restore();
}

// Canvas native size
const CW = 1080, CH = 1920;

// Region heights (px at 1080x1920)
// top: 0-420, red sep: 420-426, img: 426-1060, red sep2: 1060-1074, text: 1074-1496, red sep3: 1496-1510, logo+url: 1510-1920
const TOP_H  = 420;
const SEP1   = 8;
const IMG_Y  = TOP_H + SEP1;       // 428
const IMG_H  = 632;                 // 428 to 1060
const SEP2   = 14;
const TXT_Y  = IMG_Y + IMG_H + SEP2; // 1074
const TXT_H  = 422;                 // 1074 to 1496
const SEP3   = 14;
const BOT_Y  = TXT_Y + TXT_H + SEP3; // 1510
const BOT_H  = CH - BOT_Y;          // 410

// ─── Draw canvas for a given layout ───────────────
async function drawLayout(canvas, layout, titulo, noticia) {
  const ctx = canvas.getContext('2d');
  canvas.width  = CW;
  canvas.height = CH;

  // Which b64 images to use
  const topSrc = { p1: p1_top, p2: p2_top, p3: p3_top }[layout];
  const botSrc = { p1: p1_bot, p2: p2_bot, p3: p3_bot }[layout];

  const [topImg, botImg] = await Promise.all([loadB64Img(topSrc), loadB64Img(botSrc)]);

  // 1. Draw top header (original)
  ctx.drawImage(topImg, 0, 0, CW, TOP_H + SEP1);

  // 2. Red separator 1
  ctx.fillStyle = '#db0100';
  ctx.fillRect(0, TOP_H, CW, SEP1);

  // 3. User image area
  drawUserImg(ctx, userImg, 0, IMG_Y, CW, IMG_H);

  // 4. Red separator 2
  ctx.fillStyle = '#db0100';
  ctx.fillRect(0, IMG_Y + IMG_H, CW, SEP2);

  // 5. Text block background (gradient left-to-right per original)
  const textColors = {
    p1: { l: '#9e1616', r: '#222020' },
    p2: { l: '#8a1a16', r: '#201e1e' },
    p3: { l: '#b30101', r: '#450606' },
  }[layout];
  const grad = ctx.createLinearGradient(0, 0, CW, 0);
  grad.addColorStop(0, textColors.l);
  grad.addColorStop(1, textColors.r);
  ctx.fillStyle = grad;
  ctx.fillRect(0, TXT_Y, CW, TXT_H);

  // 6. Vertical left red accent bar (matches original — just slightly lighter left edge)
  const barColors = { p1: '#b80c0b', p2: '#a80a0a', p3: '#cc0000' }[layout];
  ctx.fillStyle = barColors;
  ctx.fillRect(0, TXT_Y, 10, TXT_H);

  // 7. Red separator 3
  ctx.fillStyle = '#db0100';
  ctx.fillRect(0, TXT_Y + TXT_H, CW, SEP3);

  // 8. Bottom (logo + url) — original
  ctx.drawImage(botImg, 0, BOT_Y, CW, BOT_H);

  // ── TEXT RENDERING ──────────────────────────────

  // TITULO — placed in the top header area
  // Each layout has title at different position in header
  const titPos = {
    p1: { x: 90, y: 310, maxW: 900, lh: 70, size: 58 },
    p2: { x: 90, y: 330, maxW: 900, lh: 70, size: 58 },
    p3: { x: 90, y: 320, maxW: 900, lh: 70, size: 58 },
  }[layout];

  ctx.font = `900 ${titPos.size}px "Barlow Condensed", sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'left';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 6;
  if (titulo) wrapText(ctx, titulo.toUpperCase(), titPos.x, titPos.y, titPos.maxW, titPos.lh);
  ctx.shadowBlur = 0;

  // NOTICIA — text block
  ctx.font = '800 56px "Barlow Condensed", sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'left';
  if (noticia) wrapText(ctx, noticia.toUpperCase(), 60, TXT_Y + 90, CW - 100, 70);
}

// ─── Generate all 3 layouts ─────────────────────
async function generateAll() {
  const titulo  = document.getElementById('titulo').value.trim();
  const noticia = document.getElementById('noticia').value.trim();

  if (!titulo && !noticia) {
    alert('Preencha ao menos o título ou o texto da notícia.');
    return;
  }

  document.getElementById('placeholder').style.display = 'none';
  const grid = document.getElementById('layoutsGrid');
  grid.style.display = 'grid';
  grid.innerHTML = '';

  const layouts = [
    { id: 'p1', label: 'Layout 1 — AgoraMT' },
    { id: 'p2', label: 'Layout 2 — TV Cidade Record' },
    { id: 'p3', label: 'Layout 3 — Jovem Pan FM' },
  ];

  for (const [i, layout] of layouts.entries()) {
    const card = document.createElement('div');
    card.className = 'layout-card';

    const lbl = document.createElement('div');
    lbl.className = 'layout-label';
    lbl.innerHTML = `<div class="lnum">${i+1}</div>${layout.label}`;

    const wrap = document.createElement('div');
    wrap.className = 'canvas-wrap';

    const canvas = document.createElement('canvas');
    wrap.appendChild(canvas);

    const btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:8px';

    const btnDl = document.createElement('button');
    btnDl.className = 'btn-dl';
    btnDl.innerHTML = '⬇ Baixar PNG';
    btnDl.onclick = () => {
      const a = document.createElement('a');
      a.download = `post-${layout.id}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    };
    btnRow.appendChild(btnDl);

    card.appendChild(lbl);
    card.appendChild(wrap);
    card.appendChild(btnRow);
    grid.appendChild(card);

    await drawLayout(canvas, layout.id, titulo, noticia);
  }
}

document.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='Enter') generateAll(); });
</script>
